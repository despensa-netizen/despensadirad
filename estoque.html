<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>EstoqueSync — Versão 11.0 PRO (Histórico Detalhado)</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

  <style>
    :root {
      --primary: #1e3a8a; --accent: #3b82f6; --bg: #f1f5f9; --card: #ffffff;
      --text: #0f172a; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
      --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --military: #334155;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
    nav { background: var(--military); color: white; padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    
    .container { max-width: 1400px; margin: 0.5rem auto; padding: 0 0.8rem; }
    .tabs { display: flex; gap: 4px; margin-bottom: 15px; border-bottom: 2px solid var(--border); overflow-x: auto; background: white; padding: 8px 8px 0 8px; border-radius: 12px; }
    .tab-btn { padding: 10px 15px; cursor: pointer; border: none; background: none; font-weight: 700; color: #64748b; border-bottom: 3px solid transparent; transition: 0.3s; white-space: nowrap; font-size: 0.7rem; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .grid-layout { display: grid; grid-template-columns: 380px 1fr; gap: 1rem; }
    @media (max-width: 1024px) { .grid-layout { grid-template-columns: 1fr; } }

    .card { background: var(--card); border-radius: 12px; padding: 1.2rem; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 1rem; }
    .card h3 { margin-top: 0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; color: var(--primary); border-bottom: 1px solid #f8fafc; padding-bottom: 8px; text-transform: uppercase; }

    .btn { cursor: pointer; border: none; padding: 12px 16px; border-radius: 8px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 0.75rem; text-transform: uppercase; min-height: 44px; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-scanner { background: #6366f1; color: white; width: 100%; margin-bottom: 15px; }

    .table-container { width: 100%; overflow-x: auto; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 5px; }
    th { text-align: left; font-size: 0.65rem; color: #64748b; padding: 10px; background: #f8fafc; text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }
    .badge-saida { background: #fee2e2; color: #991b1b; }
    .badge-entrada { background: #dcfce7; color: #166534; }
    .badge-ajuste { background: #f1f5f9; color: #475569; }

    input, select { width: 100%; padding: 12px; margin: 4px 0 10px 0; border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem; background: #f8fafc; }
    .hidden { display: none !important; }

    .recebimento-label { display: block; font-size: 0.6rem; font-weight: 800; color: #334155; margin-bottom: 4px; text-transform: uppercase; }
    
    #qrModal, #modalBaixa { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 15px; }
    .qr-box, .baixa-box { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; }

    @media print { .btn, .tabs, nav { display: none !important; } }
  </style>
</head>
<body>

  <nav>
    <div style="display:flex; align-items:center; gap:8px;">
      <i class="fas fa-boxes-packing"></i>
      <h2 style="margin:0; font-size: 0.95rem;">ESTOQUESYNC <span style="font-weight:300;">PRO v11</span></h2>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="userRoleDisplay" class="role-badge" style="font-size:0.6rem; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:4px;">...</span>
      <button id="logoutBtn" class="btn" style="background:transparent; color:white; padding:0; min-height:auto;">SAIR</button>
    </div>
  </nav>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(event, 'tab-saidas')"><i class="fas fa-barcode"></i> Saídas</button>
      <button class="tab-btn" id="tabBtnCadastro" onclick="switchTab(event, 'tab-cadastro')"><i class="fas fa-plus-circle"></i> Gestão</button>
      <button class="tab-btn" onclick="switchTab(event, 'tab-recebimento')"><i class="fas fa-truck-ramp-box"></i> Recebimento</button>
      <button class="tab-btn" onclick="switchTab(event, 'tab-inventario')"><i class="fas fa-clipboard-check"></i> Inventário</button>
      <button class="tab-btn" onclick="switchTab(event, 'tab-historico'); carregarHistorico();"><i class="fas fa-history"></i> Histórico</button>
    </div>

    <div id="tab-saidas" class="tab-content">
      <div class="grid-layout">
        <aside>
          <div class="card">
            <h3><i class="fas fa-hand-holding"></i> Saída Manual</h3>
            <form id="formSaidaManual">
              <label class="recebimento-label">PRODUTO</label>
              <select id="saidaProdSelect" onchange="atualizarLotesSaida(this.value)" required><option value="">Selecione...</option></select>
              <label class="recebimento-label">LOTE/MARCA (PEPS)</label>
              <select id="saidaLoteSelect" required><option value="">Selecione o Lote...</option></select>
              <label class="recebimento-label">QUANTIDADE</label>
              <input type="number" id="saidaQtd" placeholder="0.00" step="0.01" required>
              <label class="recebimento-label">DESTINO</label>
              <input type="text" id="saidaMotivo" placeholder="Ex: Rancho / Cozinha" required>
              <button type="submit" class="btn btn-success" style="width:100%;">REGISTRAR SAÍDA</button>
            </form>
          </div>
        </aside>
        <main>
          <div class="card">
            <h3><i class="fas fa-warehouse"></i> Estoque Disponível</h3>
            <div class="table-container">
              <table id="tabelaEstoque">
                <thead><tr><th>Produto</th><th>Lote/Marca</th><th>Saldo</th><th>Validade</th><th>QR</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div id="tab-historico" class="tab-content hidden">
      <div class="card">
        <h3><i class="fas fa-history"></i> Histórico de Movimentações (Detalhado)</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>Data</th><th>Tipo</th><th>Produto / Lote</th><th>Qtd</th><th>Usuário</th></tr></thead>
            <tbody id="corpoHist"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-recebimento" class="tab-content hidden">
        <div class="card">
            <h3>Registrar Entrada</h3>
            <form id="formRecebimento">
                <select id="recProdSelect" required></select>
                <input type="text" id="recMarca" placeholder="Marca/Fabricante" required>
                <input type="text" id="recLote" placeholder="Número do Lote" required>
                <input type="number" id="recQtd" placeholder="Quantidade" step="0.01" required>
                <input type="date" id="recValidade" required>
                <button type="submit" class="btn btn-primary" style="width:100%;">FINALIZAR ENTRADA</button>
            </form>
        </div>
    </div>

  </div>

  <script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = { 
      apiKey: "AIzaSyCw9_UbayZEcIZOu65yoOSGbHAlomxs-GE", 
      authDomain: "estoquesync-f0d10.firebaseapp.com", 
      projectId: "estoquesync-f0d10", 
      storageBucket: "estoquesync-f0d10.appspot.com", 
      messagingSenderId: "67257178512", 
      appId: "1:67257178512:web:cdf3f994c0bc87c73ffb15" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let produtosCache = [];
    let lotesCache = [];

    // INICIALIZAÇÃO
    auth.onAuthStateChanged(user => {
      if(user) {
        document.getElementById('userRoleDisplay').innerText = user.email;
        monitorarDados();
      } else {
          // Redirecionar para login se necessário
      }
    });

    function monitorarDados() {
        db.collection('estoque').orderBy('nome').onSnapshot(snap => {
            produtosCache = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarEstoque();
        });
        db.collection('lotes').orderBy('validade').onSnapshot(snap => {
            lotesCache = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarEstoque();
        });
    }

    // REGISTRO DE LOG DETALHADO (A MELHORIA SOLICITADA)
    async function registrarLog(tipo, produto, qtd, observacao = "", marca = "", lote = "") {
        try {
            await db.collection('historico').add({
                data: new Date().toISOString(),
                tipo: tipo,
                produto: produto,
                marca: marca || "---",
                lote: lote || "---",
                qtd: qtd,
                usuario: auth.currentUser.email,
                obs: observacao
            });
        } catch (e) { console.error("Erro log:", e); }
    }

    // RENDERIZAR TABELA DE ESTOQUE
    function renderizarEstoque() {
        const tb = document.querySelector('#tabelaEstoque tbody');
        const selSaida = document.getElementById('saidaProdSelect');
        const selRec = document.getElementById('recProdSelect');
        
        tb.innerHTML = '';
        selSaida.innerHTML = selRec.innerHTML = '<option value="">Selecione...</option>';

        produtosCache.forEach(p => {
            const lotesDoProd = lotesCache.filter(l => l.produtoId === p.id && l.quantidade > 0);
            const saldoTotal = lotesDoProd.reduce((acc, curr) => acc + curr.quantidade, 0);

            // Linha do Produto Pai
            tb.innerHTML += `<tr style="background:#f1f5f9; font-weight:700;"><td>${p.nome}</td><td>GERAL</td><td>${saldoTotal.toFixed(2)}</td><td>-</td><td></td></tr>`;
            
            // Opções nos Selects
            selSaida.innerHTML += `<option value="${p.id}">${p.nome}</option>`;
            selRec.innerHTML += `<option value="${p.id}">${p.nome}</option>`;

            // Linhas dos Lotes (Filhos)
            lotesDoProd.forEach(l => {
                tb.innerHTML += `<tr>
                    <td style="padding-left:20px; font-size:0.7rem; color:#64748b;">↳ ${l.marca}</td>
                    <td style="font-size:0.7rem;">Lote: ${l.lote}</td>
                    <td>${l.quantidade.toFixed(2)}</td>
                    <td style="font-size:0.7rem;">${l.validade}</td>
                    <td><i class="fas fa-qrcode" style="cursor:pointer" onclick="alert('Lote: ${l.lote}')"></i></td>
                </tr>`;
            });
        });
    }

    // CARREGAR HISTÓRICO COM DETALHES DE MARCA E LOTE
    async function carregarHistorico() {
        const corpo = document.getElementById('corpoHist');
        db.collection('historico').orderBy('data', 'desc').limit(30).get().then(snap => {
            corpo.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const dataLocal = new Date(d.data).toLocaleString('pt-BR');
                const badge = d.tipo.includes('SAÍDA') ? 'badge-saida' : 'badge-entrada';
                
                corpo.innerHTML += `
                    <tr>
                        <td style="font-size:0.65rem;">${dataLocal}</td>
                        <td><span class="badge ${badge}">${d.tipo}</span></td>
                        <td>
                            <div style="font-weight:600;">${d.produto}</div>
                            <div style="font-size:0.65rem; color:#64748b;">Marca: ${d.marca} | Lote: ${d.lote}</div>
                        </td>
                        <td style="font-weight:700; color:${d.qtd < 0 ? 'red' : 'green'}">${d.qtd}</td>
                        <td style="font-size:0.65rem;">${d.usuario.split('@')[0]}</td>
                    </tr>
                `;
            });
        });
    }

    // LÓGICA DE SAÍDA MANUAL
    function atualizarLotesSaida(pId) {
        const selLote = document.getElementById('saidaLoteSelect');
        selLote.innerHTML = '<option value="">Selecione o Lote...</option>';
        lotesCache.filter(l => l.produtoId === pId && l.quantidade > 0).forEach(l => {
            selLote.innerHTML += `<option value="${l.id}">${l.marca} (Lote: ${l.lote}) - Saldo: ${l.quantidade}</option>`;
        });
    }

    document.getElementById('formSaidaManual').onsubmit = async (e) => {
        e.preventDefault();
        const lId = document.getElementById('saidaLoteSelect').value;
        const qtd = parseFloat(document.getElementById('saidaQtd').value);
        const motivo = document.getElementById('saidaMotivo').value;
        
        const lote = lotesCache.find(l => l.id === lId);
        const produto = produtosCache.find(p => p.id === lote.produtoId);

        if(lote.quantidade < qtd) return alert("Saldo insuficiente no lote!");

        await db.collection('lotes').doc(lId).update({
            quantidade: firebase.firestore.FieldValue.increment(-qtd)
        });

        await registrarLog("SAÍDA MANUAL", produto.nome, -qtd, motivo, lote.marca, lote.lote);
        alert("Saída realizada!");
        e.target.reset();
    };

    // LÓGICA DE ENTRADA
    document.getElementById('formRecebimento').onsubmit = async (e) => {
        e.preventDefault();
        const pId = document.getElementById('recProdSelect').value;
        const marca = document.getElementById('recMarca').value;
        const loteNum = document.getElementById('recLote').value;
        const qtd = parseFloat(document.getElementById('recQtd').value);
        const validade = document.getElementById('recValidade').value;

        const produto = produtosCache.find(p => p.id === pId);

        await db.collection('lotes').add({
            produtoId: pId,
            marca: marca,
            lote: loteNum,
            quantidade: qtd,
            validade: validade
        });

        await registrarLog("ENTRADA", produto.nome, qtd, "Recebimento", marca, loteNum);
        alert("Entrada registrada!");
        e.target.reset();
    };

    // NAVEGAÇÃO DE ABAS
    function switchTab(evt, tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.remove('hidden');
      evt.currentTarget.classList.add('active');
    }
  </script>
</body>
</html>
